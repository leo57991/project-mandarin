<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>語境偵緝：雪國列車 - 無縫橫捲軸</title>
    <style>
        :root {
            --pixel-size: 4px;
            --ui-gold: #d4af37;
            --ground-y: 98%; /* 從 101% 稍微調升 3% */
        }

        body {
            margin: 0; padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }

        /* 遊戲視窗容器 填滿視窗 */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* 可捲動的大世界 (寬度設定為 3 張底圖：1024*3 = 3072) */
        #world {
            position: absolute;
            top: 0; left: 0;
            width: 3072px; /* 3個循環寬度 */
            height: 100vh;
            background-image: url('assets/bg_dining_empty_seamless.png');
            background-repeat: repeat-x;
            background-size: auto 100%; /* 高度填滿，寬度等比 */
            image-rendering: pixelated;
        }

        /* 實體的通用樣式 */
        .entity {
            position: absolute;
            transform: translate(-50%, -100%);
            image-rendering: pixelated;
            z-index: 10;
        }

        /* 玩家實體（已被隱藏，僅作為相機跟隨的錨點） */
        #player {
            display: none;
            width: 60px;
            height: 120px;
            z-index: 50;
        }

        /* 方向翻轉 */
        .facing-left { transform: translate(-50%, -100%) scaleX(-1); }
        .facing-right { transform: translate(-50%, -100%) scaleX(1); }

        /* 互動物件 Placeholder (未來可由使用者自定外觀) */
        .interactable {
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 5;
            cursor: pointer;
        }
        
        .interactable:hover {
            filter: brightness(1.2) drop-shadow(0 0 5px var(--ui-gold));
        }

        /* 浮動對話氣泡 -> 視覺小說式大面板 */
        #speech-bubble {
            position: fixed;
            bottom: 0; left: 0;
            width: 100vw;
            height: 38vh;
            background: linear-gradient(to top, rgba(15, 10, 5, 0.98) 60%, rgba(20, 15, 10, 0.95) 100%);
            border-top: 3px solid var(--ui-gold);
            border-left: none; border-right: none; border-bottom: none;
            border-radius: 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
            color: #eee;
            padding: 4vh 10vw;
            box-sizing: border-box;
            font-size: 24px;
            line-height: 1.6;
            pointer-events: auto;
            display: none;
            z-index: 5000;
            animation: slide-up 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes slide-up {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .bubble-name {
            color: var(--ui-gold);
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 1.5vh;
            display: block;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 2px;
        }

        #bubble-text {
            font-size: 22px;
            color: #ddd;
            display: block;
            min-height: 8vh;
            /* 字元精準排列用 */
            letter-spacing: 0;
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        /* === Pretext-Lite 文字特效系統 === */

        /* 基礎字元 span：每個字元或詞語的包裝容器 */
        .char-span {
            display: inline;
            position: relative;
        }

        /* [shake] 語氣顫抖：NPC 緊張、說謊、隱瞞情緒 */
        .txt-shake {
            display: inline-block;
            animation: txt-shake-kf 0.15s infinite;
            color: #ffcc88;
        }
        @keyframes txt-shake-kf {
            0%   { transform: translate(0, 0) rotate(0deg); }
            20%  { transform: translate(-1px, 1px) rotate(-0.5deg); }
            40%  { transform: translate(1px, -1px) rotate(0.5deg); }
            60%  { transform: translate(-1px, -1px) rotate(-0.5deg); }
            80%  { transform: translate(1px, 1px) rotate(0.5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* [ink] 墨水暈染：關鍵線索詞、人物名字第一次被提及 */
        .txt-ink {
            display: inline-block;
            position: relative;
            color: #fff;
        }
        .txt-ink::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 3px;
            background: var(--ui-gold);
            border-radius: 2px;
            animation: txt-ink-spread 1.2s ease-out forwards;
        }
        @keyframes txt-ink-spread {
            0%   { width: 0; opacity: 1; }
            60%  { width: 100%; opacity: 1; }
            100% { width: 100%; opacity: 0.5; }
        }

        /* [hint] 偵探直覺：玩家選錯語法選項，對話中出錯的關鍵詞 */
        .txt-hint {
            display: inline-block;
            color: #ff9966;
            position: relative;
            cursor: help;
        }
        .txt-hint::before {
            content: '⚠';
            position: absolute;
            top: -18px; left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #ff6666;
            animation: txt-hint-bounce 1s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes txt-hint-bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50%       { transform: translateX(-50%) translateY(-4px); }
        }

        /* [key] 線索高亮：玩家已收集的線索詞被提及時 */
        .txt-key {
            display: inline-block;
            color: var(--ui-gold);
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.8);
            animation: txt-key-pulse 2s ease-in-out infinite;
        }
        @keyframes txt-key-pulse {
            0%, 100% { text-shadow: 0 0 8px rgba(212, 175, 55, 0.4); }
            50% { text-shadow: 0 0 16px rgba(212, 175, 55, 1); }
        }

        /* [crime] 死亡/犯罪詞彙：讓字呈現血色並微微颤動 */
        .txt-crime {
            display: inline-block;
            color: #cc3333;
            animation: txt-crime-throb 2s ease-in-out infinite;
        }
        @keyframes txt-crime-throb {
            0%, 100% { color: #cc3333; filter: brightness(1); }
            50% { color: #ff4444; filter: brightness(1.3); }
        }

        #bubble-options {
            margin-top: 2vh;
            display: flex; gap: 20px; flex-wrap: wrap; flex-direction: row;
        }

        .bubble-next {
            position: absolute;
            bottom: 4vh; right: 5vw;
            color: #aaa;
            cursor: pointer;
            font-size: 20px;
            letter-spacing: 1px;
            animation: breathe 1.5s infinite alternate;
        }
        .bubble-next:hover { color: var(--ui-gold); }

        @keyframes breathe {
            from { opacity: 0.5; transform: translateX(0); }
            to { opacity: 1; transform: translateX(5px); }
        }

        .dialogue-btn {
            background: rgba(30, 20, 10, 0.8);
            border: 2px solid #555;
            color: #ccc;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .dialogue-btn:hover {
            background: rgba(50, 35, 15, 0.9);
            border-color: var(--ui-gold);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(212,175,55,0.3);
        }

        /* UI - 背包按鈕 */
        #inventory-btn {
            position: absolute;
            bottom: 30px; right: 30px;
            width: 60px; height: 60px;
            background-color: rgba(30, 20, 10, 0.9);
            border: 2px solid var(--ui-gold);
            border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            font-size: 28px; cursor: pointer;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        #inv-badge {
            position: absolute; top: -8px; right: -8px;
            background: #b22222; color: #fff;
            width: 24px; height: 24px; border-radius: 50%;
            font-size: 12px; font-weight: bold; font-family: sans-serif;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s;
            border: 2px solid #000;
        }

        /* UI - 音樂開關按鈕 */
        #bgm-btn {
            position: absolute;
            bottom: 30px; right: 110px;
            width: 60px; height: 60px;
            background-color: rgba(30, 20, 10, 0.9);
            border: 2px solid var(--ui-gold);
            border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            font-size: 28px; cursor: pointer;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            opacity: 0.5; /* 預設半透明直到音樂真的開始播放 */
        }

        /* UI - 指認兇手按鈕 */
        #accuse-btn {
            position: absolute;
            bottom: 30px; right: 190px;
            height: 60px; padding: 0 20px;
            background-color: rgba(60, 10, 10, 0.9);
            border: 2px solid #F44336;
            color: #F44336;
            border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; font-weight: bold; cursor: pointer;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(244, 67, 54, 0.4);
            transition: all 0.2s;
        }
        #accuse-btn:hover { background-color: rgba(100, 20, 20, 0.9); transform: scale(1.05); }

        /* 背包面板 */
        #inventory-panel {
            position: absolute;
            inset: 60px;
            background: rgba(15, 10, 5, 0.98);
            border: 4px solid var(--ui-gold);
            z-index: 2000;
            display: none;
            padding: 30px;
            flex-direction: column;
        }
        
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 32px; color: var(--ui-gold); cursor: pointer; }
        
        .inv-grid {
            display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; overflow-y: auto;
        }
        .inv-item {
            width: 100px; height: 100px;
            border: 2px solid #555;
            background: #222;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 14px; text-align: center; color: #ccc; padding: 10px; cursor: help;
        }

        /* 結局結算畫面 */
        #ending-screen {
            position: fixed; inset: 0;
            z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.95);
            padding: 40px; text-align: center;
        }

        #ending-title { font-size: 64px; font-weight: bold; margin-bottom: 20px; letter-spacing: 5px; }
        #ending-desc { font-size: 28px; line-height: 1.6; max-width: 800px; margin-bottom: 50px; color: #eee; }
        .restart-btn {
            background: rgba(30, 20, 10, 0.8); border: 2px solid var(--ui-gold); color: var(--ui-gold);
            padding: 15px 40px; border-radius: 8px; font-size: 24px; cursor: pointer;
            transition: all 0.2s;
        }
        .restart-btn:hover { background: rgba(212, 175, 55, 0.2); }

        /* 偵探評鑑書 */
        #eval-report {
            position: absolute; left: 50%; top: 50%;
            background: #F5E6C8; /* 米黃色舊紙張 */
            border: 8px solid #5C3A21; /* 深棕色皮革 */
            border-radius: 12px; color: #333;
            font-family: 'cursive', 'Courier New', sans-serif;
            width: 85vw; max-width: 900px; height: 80vh;
            padding: 40px; box-sizing: border-box;
            display: none; flex-direction: column;
            z-index: 10000;
            box-shadow: 15px 15px 40px rgba(0,0,0,0.8);
            /* 從右下角飛入 */
            transform: translate(50vw, 50vh) rotate(20deg) scale(0.5);
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.8s;
            opacity: 0;
        }

        #eval-report.show {
            transform: translate(-50%, -50%) rotate(0deg) scale(1);
            opacity: 1;
        }

        #eval-header { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 2px solid #5C3A21; padding-bottom: 1vh; margin-bottom: 2vh;}
        .eval-title { font-size: 38px; font-weight: bold; margin: 0; letter-spacing: 2px;}
        .eval-rank { font-size: 56px; color: #b71c1c; font-weight: bold; text-shadow: 2px 2px 2px rgba(0,0,0,0.2);}

        #eval-body { display: flex; gap: 40px; flex: 1; overflow-y: auto; text-align: left; }
        .eval-left, .eval-right { flex: 1; }
        .eval-left h3, .eval-right h3 { color: #5C3A21; border-bottom: 1px dashed #5C3A21; padding-bottom: 5px; margin-top:0;}
        
        .eval-item { margin-bottom: 15px; font-size: 18px; line-height: 1.5; border-bottom: 1px dashed #cca; padding-bottom: 10px; }
        .eval-item.right { color: #2E7D32; }
        .eval-item.wrong { color: #C62828; }
        
        #eval-footer { margin-top: 2vh; font-size: 26px; font-weight: bold; text-align: center; border-top: 2px solid #5C3A21; padding-top: 2vh; color: #5C3A21;}

        .close-eval-btn {
            position: absolute; top: -25px; right: -25px;
            width: 50px; height: 50px; background: #5C3A21; color: #F5E6C8;
            border-radius: 50%; font-size: 36px; border: 4px solid #F5E6C8;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        .close-eval-btn:hover { transform: scale(1.1); }

        /* 切換場景確認框 */
        #transition-confirm {
            position: fixed; inset: 0; z-index: 6000;
            background: rgba(0,0,0,0.85);
            display: flex; justify-content: center; align-items: center;
        }
        .confirm-box {
            background: rgba(20, 15, 10, 0.95);
            border: 2px solid var(--ui-gold);
            padding: 40px 60px; border-radius: 8px; text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            animation: pop-in 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        @keyframes pop-in {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        #confirm-text { color: #eee; margin-top: 0; margin-bottom: 30px; letter-spacing: 2px; font-size: 28px;}
        .highlight-text {
            background-color: var(--ui-gold); color: #111;
            padding: 2px 8px; border-radius: 4px; border: 1px solid #ffde73;
            box-shadow: 0 0 10px rgba(212,175,55,0.6); font-weight: bold;
        }
        .confirm-options { display: flex; gap: 30px; justify-content: center; }
        .confirm-options button {
            background: rgba(0,0,0,0.5); border: 2px solid #555; color: #ccc;
            padding: 12px 35px; font-size: 22px; cursor: pointer; border-radius: 6px;
            transition: all 0.2s;
        }
        .confirm-options button:hover {
            border-color: var(--ui-gold); color: var(--ui-gold); background: rgba(50,40,20,0.7);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
        }

        /* 場景傳送門 (平時隱形，隱入背景) */
        .scene-door {
            position: absolute;
            height: 50vh; width: 8vw; min-width: 120px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: transparent; 
            font-size: 20px; font-weight: bold;
            transition: all 0.3s;
            transform: translateY(-50%);
            z-index: 10;
        }
        .scene-door:hover {
            background: rgba(255, 215, 0, 0.05); /* 微微的車廂光 */
            color: var(--ui-gold);
            text-shadow: 0 0 10px #000;
        }

        /* 門把傳送點 (完全隱藏，觸摸散發淡光) */
        .door-knob {
            position: absolute;
            height: 40px; width: 40px;
            background: transparent;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        .door-knob:hover {
            /* 淡淡的光線包覆那個門把 */
            box-shadow: 0 0 20px 10px rgba(255, 215, 0, 0.3);
            background: rgba(255, 215, 0, 0.1);
        }

        /* 開發者模式樣式 */
        body.dev-mode .entity {
            border: 2px solid #0f0 !important;
            background: rgba(0,255,0,0.2) !important;
            box-shadow: none !important;
            text-shadow: none !important;
        }
        body.dev-mode .entity::after {
            content: attr(data-id) ' (' attr(data-x) 'px, ' attr(data-y) ')';
            position: absolute;
            top: -25px; left: 50%;
            transform: translateX(-50%);
            background: #000;
            color: #0f0;
            font-size: 14px;
            font-family: monospace;
            padding: 2px 4px;
            white-space: nowrap;
            z-index: 100;
            border: 1px solid #0f0;
            pointer-events: none;
        }

        /* 隱密式場景線索互動區 (取代原本的白字黑框) */
        .interact-item {
            position: absolute;
            height: 30px; width: 30px;
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid transparent;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        .interact-item:hover {
            background: rgba(255, 215, 0, 0.4);
            border: 2px dashed rgba(255, 215, 0, 0.8);
            transform: translate(-50%, -50%) scale(1.3);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }
        
        /* 收集飛入動畫 */
        .fly-item {
            position: absolute;
            width: 40px; height: 40px;
            background: #fff;
            border-radius: 50%;
            z-index: 3000;
            pointer-events: none;
            animation: fly-to-bag 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes fly-to-bag {
            0% { transform: scale(1); opacity: 1; }
            100% { 
                /* 移往螢幕右下角背包 */
                transform: translate(calc(100vw - 60px - var(--start-x)), calc(100vh - 60px - var(--start-y))) scale(0.2); 
                opacity: 0; 
            }
        }

        /* 動態下雪濾鏡 (輕微不干擾) */
        #snow-layer {
            position: absolute; inset: 0;
            pointer-events: none; z-index: 3500;
            background-image: 
                radial-gradient(circle, rgba(255,255,255,0.6) 1px, transparent 1px),
                radial-gradient(circle, rgba(255,255,255,0.3) 1px, transparent 1px);
            background-size: 150px 150px, 100px 100px;
            background-position: 0 0, 50px 50px;
            animation: snow-fall 2.5s linear infinite;
        }

        @keyframes snow-fall {
            0% { background-position: 0 0, 50px 50px; }
            100% { background-position: -400px 300px, -200px 200px; }
        }

        /* 古董瓦斯燈閃爍特效 (強化亮度與動態對比) */
        #flicker-overlay {
            position: absolute; inset: 0;
            /* 改用全螢幕的黑色/暖褐色蒙版，以此來控制整體亮度 */
            background: rgba(15, 5, 0, 0.35); 
            pointer-events: none; z-index: 3600;
            /* 加快閃爍頻率，並改為較隨機的 step-end 感 */
            animation: flicker-light 5s infinite;
        }

        @keyframes flicker-light {
            0%   { opacity: 1; }
            5%   { opacity: 0.2; } /* 突然變亮 (蒙版透明) */
            8%   { opacity: 1; }
            10%  { opacity: 0.5; }
            12%  { opacity: 1; }
            40%  { opacity: 0.9; }
            42%  { opacity: 0.1; } /* 瞬間閃跳 */
            44%  { opacity: 1; }
            70%  { opacity: 1; }
            100% { opacity: 0.8; }
        }

        /* NPC 庫 */
        .npc-sprite {
            height: 65vh;
            width: auto;
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.5));
            cursor: pointer;
        }
        .npc-sprite:hover { filter: brightness(1.2) drop-shadow(0 0 5px var(--ui-gold)); }

        .npc-chen { content: url('assets/npc_chen.png'); }
        .npc-zhao { content: url('assets/npc_zhao.png'); }
        .npc-baroness { content: url('assets/npc_baroness.png'); }
        .npc-fang { content: url('assets/npc_fang.png'); }

        .plate-sprite {
            width: 120px; height: auto;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.8));
        }

        /* 操作提示 */
        #hud-hint {
            position: absolute; top: 20px; left: 20px;
            color: rgba(255,255,255,0.5); font-size: 14px; z-index: 100;
        }

        /* 掃描線濾鏡 */
        /* 標題畫面 CSS */
        #title-screen {
            position: fixed; inset: 0;
            background: #000 url('assets/bg_title_pixel.png') no-repeat center center;
            background-size: cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9000;
            color: var(--ui-gold); text-align: center;
        }
        #title-screen::after {
            content: ''; position: absolute; inset: 0;
            background: rgba(0,0,0,0.3); z-index: -1;
        }
        .main-title {
            font-size: 80px; margin: 0;
            animation: fadeIn 3s forwards;
            text-shadow: 0 0 20px rgba(0,0,0,0.8), 2px 2px 4px #000;
        }
        .sub-title {
            font-size: 32px; opacity: 0;
            animation: fadeIn 3s 1s forwards;
            letter-spacing: 10px; margin-top: 20px;
            font-weight: bold;

<body>

        <div id="dev-toggle-btn" onclick="toggleDevMode()" style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color:#0f0; border:1px solid #0f0; padding:5px 10px; cursor:pointer; z-index:10000; font-family: monospace;">Dev Mode: OFF</div>

    <script>
        // --- 核心變數 ---
        const world = document.getElementById('world');
        const gameContainer = document.getElementById('game-container');
        const bubble = document.getElementById('speech-bubble');

        // =====================================================
        // Pretext-Lite: 文字佈局引擎
        // 靈感來自 github.com/chenglou/pretext
        // 核心：用 Canvas 精確測量字寬，實作中文避頭尾排版，
        // 並將 [tag]文字[/tag] 語法轉換為對應 HTML 特效 span
        // =====================================================
        const TextLayoutEngine = (() => {
            // 中文標點避頭字元（不能出現在行首的標點）
            const NO_LINE_START = new Set(['，', '。', '！', '？', '、', '；', '：', '』', '」', '》', '）', '】', '…', '—']);

            // 特效標籤對照表
            const EFFECT_TAGS = {
                'shake': 'txt-shake',
                'ink':   'txt-ink',
                'hint':  'txt-hint',
                'key':   'txt-key',
                'crime': 'txt-crime'
            };

            // 解析帶有特效標籤的文字，返回分段陣列 [{text, className}]
            function parseSegments(rawText) {
                const segments = [];
                const tagPattern = /\[(\w+)\](.*?)\[\/\1\]/gs;
                let lastIndex = 0;
                let match;
                while ((match = tagPattern.exec(rawText)) !== null) {
                    // 標籤前的普通文字
                    if (match.index > lastIndex) {
                        segments.push({ text: rawText.slice(lastIndex, match.index), className: null });
                    }
                    // 標籤內的文字
                    const cls = EFFECT_TAGS[match[1]] || null;
                    segments.push({ text: match[2], className: cls });
                    lastIndex = tagPattern.lastIndex;
                }
                // 剩餘普通文字
                if (lastIndex < rawText.length) {
                    segments.push({ text: rawText.slice(lastIndex), className: null });
                }
                return segments;
            }

            // 將解析後的分段轉為 HTML 字串
            // 對每個字元逐一包裝，兼顧避頭尾處理
            function segmentsToHTML(segments) {
                let html = '';
                for (const seg of segments) {
                    const chars = [...seg.text]; 
                    for (let i = 0; i < chars.length; i++) {
                        const ch = chars[i];
                        const cls = seg.className ? ` ${seg.className}` : '';
                        
                        // 全部包裝在 char-span 中以利打字機與排版控制
                        if (NO_LINE_START.has(ch)) {
                            html += `<span class="char-span${cls}" style="white-space:nowrap; opacity:1">${ch}</span>`;
                        } else {
                            html += `<span class="char-span${cls}" style="opacity:1">${ch}</span>`;
                        }
                    }
                }
                return html;
            }

            // 公開 API：將原始文字（含特效標籤）轉換為對應 innerHTML
            function render(rawText) {
                const segments = parseSegments(rawText);
                return segmentsToHTML(segments);
            }

            return { render };
        })();

        // --- 用新引擎設定文字的工具函式 ---
        function setDialogueText(text) {
            const el = document.getElementById('bubble-text');
            el.innerHTML = TextLayoutEngine.render(text);
        }

        
        // --- 動態計算世界比例 ---
        // 背景圖是 1024x512 (比例 2:1)。當 height 撐滿 100vh 時，實際圖片的 width = 100vh * 2。
        // 我們給世界設定了 3張圖 的寬度，所以 WORLD_W = 100vh * 2 * 3。
        let VIEW_W = window.innerWidth;
        let VIEW_H = window.innerHeight;
        let WORLD_W = VIEW_H * 2 * 3; 
        
        // 更新世界寬度
        world.style.width = WORLD_W + 'px';

        // 監聽視窗變化更新
        window.addEventListener('resize', () => {
            VIEW_W = window.innerWidth;
            VIEW_H = window.innerHeight;
            WORLD_W = VIEW_H * 2 * 3;
            world.style.width = WORLD_W + 'px';
            camX = Math.max(0, Math.min(WORLD_W - VIEW_W, camX)); // 防止相機出界
        });
        
        // 攝影機位置
        let camX = 0; 
        const speed = 8; // 視野平移速度
        
        // 狀態管理
        const keys = {};
        const inventory = [];
        let unseenClues = 0;
        let bgmStarted = false;
        
        // --- 完整 gameState 結構 ---
        const gameState = {
            grammarProgress: {
                GP1_HONORIFIC: { status: "NOT_STARTED", isCorrect: null },
                GP2_TIME_ADVERB: { status: "NOT_STARTED", isCorrect: null },
                GP3_LOCATION_WORD: { status: "NOT_STARTED", isCorrect: null },
                GP4_WORD_ORDER: { status: "NOT_STARTED", isCorrect: null }
            },
            clues: { collected: [], details: {} },
            npcs: {
                CHEN_AFAR: { met: false, dialogueNode: "START", name: "陳阿發" },
                ZHAO: { met: false, dialogueNode: "START", name: "趙福生" },
                BARONESS: { met: false, dialogueNode: "START", name: "男爵夫人" },
                FANG: { met: false, dialogueNode: "START", name: "方記者" }
            },
            settings: {
                volume: 70,
                textSpeed: 50
            },
            rapport: {
                CHEN_AFAR: { polite: 0, aggressive: 0, bonusUnlocked: null },
                ZHAO: { polite: 0, aggressive: 0, bonusUnlocked: null },
                BARONESS: { polite: 0, aggressive: 0, bonusUnlocked: null },
                FANG: { polite: 0, aggressive: 0, bonusUnlocked: null }
            }
        };

        // --- 流程控制 logic ---
        window.onload = () => {
            const hasPlayed = localStorage.getItem('intro_played');
            if (hasPlayed) {
                // 已玩過，跳過開場動畫準備
                localStorage.removeItem('intro_played');
            }
            // 預載設定
            const volSlider = document.getElementById('vol-slider');
            const speedSelect = document.getElementById('text-speed-select');
            volSlider.oninput = (e) => {
                const vol = e.target.value;
                gameState.settings.volume = vol;
                const audio = document.getElementById('bgm');
                audio.volume = vol / 100;
            };
            speedSelect.onchange = (e) => {
                gameState.settings.textSpeed = parseInt(e.target.value);
            };
        };

        function startOpeningSequence() {
            tryStartBGM();
            document.getElementById('title-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('title-screen').style.display = 'none';
                
                // 檢查是否跳過開場
                if (localStorage.getItem('skip_intro') === 'true') {
                    localStorage.removeItem('skip_intro');
                    startGame();
                } else {
                    playOpening();
                }
            }, 1000);
        }

        function playOpening() {
            document.getElementById('opening-screen').style.display = 'block';
            
            // 動態生成雪花
            const snowContainer = document.getElementById('opening-snow');
            snowContainer.innerHTML = '';
            for(let i=0; i<50; i++) {
                const s = document.createElement('div');
                s.className = 'snow-particle';
                s.innerText = '❄';
                s.style.left = Math.random() * 100 + 'vw';
                s.style.animationDuration = (Math.random() * 3 + 2) + 's';
                s.style.animationDelay = Math.random() * 5 + 's';
                s.style.fontSize = (Math.random() * 10 + 10) + 'px';
                snowContainer.appendChild(s);
            }

            const segments = [
                "1899年冬，上海開往北京的夜班列車。",
                "攝影師江明在餐車陳屍，萊卡相機底片失蹤。",
                "你是林探長。在列車抵站前，找出兇手。"
            ];
            typeSequence(segments, 0);
        }

        async function typeSequence(segments, index) {
            if (index >= segments.length) {
                document.getElementById('opening-continue-tip').style.display = 'block';
                document.getElementById('opening-screen').onclick = () => {
                    document.getElementById('opening-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('opening-screen').style.display = 'none';

                    }, 1000);
                };
                return;
            }

            const container = document.getElementById('opening-text-content');
            const text = segments[index];
            
            // 使用引擎預渲染完整 HTML (所有字元初始為透明)
            const fullHTML = TextLayoutEngine.render(text);
            container.innerHTML = fullHTML;
            
            // 選取所有生成的字元 span 並將其設為隱藏
            const charSpans = container.querySelectorAll('.char-span');
            charSpans.forEach(s => s.style.opacity = '0');
            
            // 逐一顯示
            for (let span of charSpans) {
                span.style.opacity = '1';
                await new Promise(r => setTimeout(r, gameState.settings.textSpeed));
            }

            await new Promise(r => setTimeout(r, index === 2 ? 2000 : 1500));
            typeSequence(segments, index + 1);
        }

        function promptTransition(targetSceneId, targetSpawnX) {
            const box = document.getElementById('transition-confirm');
            document.getElementById('confirm-text').innerHTML = `要進入<span class="highlight-text">${sceneNames[targetSceneId]}</span>嗎？`;
            box.style.display = 'flex';
            
            document.getElementById('confirm-yes').onclick = () => {
                box.style.display = 'none';
                // 重置所有按鍵，避免過場後暴衝
                for (let k in keys) keys[k] = false; 
                initScene(targetSceneId, targetSpawnX);
            };
            document.getElementById('confirm-no').onclick = () => {
                box.style.display = 'none';
                // 微微推離邊界，避免放開按鈕時又瞬間接觸邊界觸發
                if (camX >= WORLD_W - VIEW_W) camX -= 15;
                if (camX <= 0) camX += 15;
            };
        }

        function initScene(sceneId, spawnX = 0) {
            currentScene = sceneId;
            const s = SCENES[sceneId];
            world.style.backgroundImage = s.bg;
            
            WORLD_W = VIEW_H * s.widthRatio;
            world.style.backgroundSize = 'auto 100%';
            world.style.backgroundPosition = 'top left';
            world.style.width = WORLD_W + 'px';

            world.innerHTML = ''; // 清空內容重繪

            camX = spawnX; // 傳送落點
            camX = Math.max(0, Math.min(WORLD_W - VIEW_W, camX));

            s.entities.forEach(ent => {
                const el = document.createElement('div');
                el.className = 'entity';
                if(ent.id) el.id = ent.id;
                el.setAttribute('data-id', ent.id || ent.type);
                el.setAttribute('data-x', ent.x);
                el.setAttribute('data-y', ent.y);

                if(ent.type === 'NPC') {
                    el.classList.add('npc-sprite');
                    el.classList.add(ent.class);
                    if(ent.transform) {
                        el.style.transform = ent.transform;
                    }
                    el.style.left = ent.x + 'px';
                    el.style.top = ent.y;
                    el.id = ent.id;
                    el.onclick = (e) => startDialogue(e, ent.id);
                } else if(ent.type === 'PLATE') {
                    el.classList.add('plate-sprite');
                    const plateImg = document.createElement('img');
                    plateImg.src = `assets/${ent.img}`;
                    plateImg.style.width = '100%';
                    el.appendChild(plateImg);
                    el.style.left = ent.x + 'px';
                    el.style.top = ent.y;
                } else if(ent.type === 'DOOR') {
                    el.classList.add('scene-door');
                    el.style.left = ent.x + 'px';
                    el.style.top = ent.y;
                    el.innerText = ent.text;
                    el.onclick = (e) => {
                        e.stopPropagation();
                        promptTransition(ent.target, ent.targetX);
                    };
                } else if(ent.type === 'KNOB') {
                    el.classList.add('door-knob');
                    el.style.left = ent.x + 'px';
                    el.style.top = ent.y;
                    el.title = '進入包廂';
                    el.onclick = (e) => {
                        e.stopPropagation();
                        promptTransition(ent.target, ent.targetX);
                    };
                } else if(ent.type === 'PUZZLE') {
                    // 謎題物件：根據 requiresClue 決定是否顯示
                    const hasClue = !ent.requiresClue || gameState.clues.collected.includes(ent.requiresClue);
                    if(!hasClue) return; // 沒有前置道具就不顯示
                    if(gameState.clues.collected.includes('CLUE_JIANGMING_NOTE')) return; // 已解謎就不再顯示

                    // 圖像式謎題觸發物件
                    el.className = ''; // 清除 entity class
                    el.classList.add('puzzle-trigger-item');
                    el.style.left = ent.x + 'px';
                    el.style.top = ent.y;
                    el.title = ent.text.replace('🔍 調查：', '');
                    el.style.position = 'absolute';
                    el.style.transform = 'translate(-50%, -50%)';
                    el.style.cursor = 'pointer';
                    el.style.zIndex = '10';

                    if (ent.imgSrc) {
                        const img = document.createElement('img');
                        img.src = ent.imgSrc;
                        img.style.width = '80px';
                        img.style.height = '80px';
                        img.style.objectFit = 'contain';
                        img.style.imageRendering = 'pixelated';
                        img.style.filter = 'drop-shadow(0 0 6px rgba(212,175,55,0.5))';
                        img.style.transition = 'all 0.2s';
                        img.style.display = 'block';
                        el.appendChild(img);

                        // 呼吸動畫提示
                        const label = document.createElement('div');
                        label.innerText = '🔍 可互動';
                        label.style.cssText = `
                            position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
                            color: var(--ui-gold); font-size: 12px; white-space: nowrap;
                            text-shadow: 0 0 6px rgba(0,0,0,0.8);
                            animation: breathe 1.5s infinite alternate;
                            pointer-events: none;
                        `;
                        el.appendChild(label);

                        el.onmouseenter = () => { img.style.filter = 'drop-shadow(0 0 14px rgba(212,175,55,1)) brightness(1.2)'; img.style.transform = 'scale(1.15)'; };
                        el.onmouseleave = () => { img.style.filter = 'drop-shadow(0 0 6px rgba(212,175,55,0.5))'; img.style.transform = 'scale(1)'; };
                    } else {
                        el.classList.add('interact-item');
                        el.style.filter = 'sepia(0.8) hue-rotate(30deg)';
                    }

                    el.onclick = (e) => {
                        e.stopPropagation();
                        openTextPuzzle();
                    };
                } else if(ent.type === 'ITEM') {
                    if(gameState.clues.collected.includes(ent.id)) return;
                    el.classList.add('interact-item');
                    el.style.left = ent.x + 'px';
                    el.style.top = ent.y;
                    el.title = ent.text.replace('🔍 調查：', ''); 
                    el.onclick = (e) => {
                        e.stopPropagation();
                        const sourceDom = e.currentTarget;
                        gameState.clues.collected.push(ent.id);
                        const clueObj = { 
                            id: ent.id, 
                            isDistorted: false, 
                            name: ent.clueName, 
                            desc: ent.playerReceived,
                            truth: ent.truthVersion
                        };
                        gameState.clues.details[ent.id] = clueObj;
                        collectItem(clueObj, sourceDom);
                        sourceDom.style.display = 'none';
                        checkAccuseButtonVisible();
                    };
                }
                world.appendChild(el);
            });
            renderUpdate();
        }

                    choices: [
                        { text: "這很可疑。", tone: "neutral", clueId: "CLUE_FANG_BANDAGE", playerReceived: "趙福生昨晚向方小蘭借繃帶，說手被割傷，但手上沒有傷口。", truthVersion: "趙福生可能是想找藉口靠近醫療包，順便偷走聽診器。", nextNode: "END" }

                },
                FANG_BONUS_AGGRESSIVE: {
                    text: "（方小蘭被激怒）你憑什麼懷疑我！我昨晚一直在幫病人看診，根本不在餐車！你去查別人吧！",
                    choices: [
                        { text: "...知道了。", tone: "neutral", clueId: "CLUE_FANG_DEFENSIVE", playerReceived: "方小蘭情緒激動，強調自己昨晚一直在幫病人看診不在餐車。", truthVersion: "方小蘭說的是實話，她確實不在場，但她激動的反應讓玩家誤以為她在隱瞞。", nextNode: "END" }
                    ]
                },
                END: { text: "（方小蘭低頭整理她的醫療包）", choices: [] }

        // --- 開發者模式 ---
        let isDevMode = false;
        function toggleDevMode() {
            isDevMode = !isDevMode;
            document.body.classList.toggle('dev-mode', isDevMode);
            document.getElementById('dev-mouse-tracker').style.display = isDevMode ? 'block' : 'none';
            document.getElementById('dev-toggle-btn').innerText = `Dev Mode: ${isDevMode ? 'ON' : 'OFF'}`;
        }

        window.addEventListener('mousemove', e => {
            if(!isDevMode) return;
            const rect = world.getBoundingClientRect();
            // Mouse X relative to the world's scroll and layout
            const mouseX = Math.round(e.clientX - rect.left);
            // Mouse Y relative to the container's height (to calculate percentage standard)
            const percY = Math.round((e.clientY / VIEW_H) * 100);
            
            const tracker = document.getElementById('dev-mouse-tracker');
            tracker.style.left = (e.clientX + 15) + 'px';
            tracker.style.top = (e.clientY + 15) + 'px';
            tracker.innerText = `X: ${mouseX}px, Y: ${percY}%`;
        });

        // --- 輸入監聽 ---
        window.addEventListener('keydown', e => {
            if (e.key === '`') toggleDevMode();
            keys[e.key.toLowerCase()] = true;
            if(e.key === ' ' && bubble.style.display === 'block') { // Space 鍵對應關閉對話
                e.preventDefault();
                const nextBtn = document.getElementById('bubble-next-btn');
                if(nextBtn && nextBtn.style.display === 'block') {
                    closeDialogue();
                }
            }
            tryStartBGM();
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // 瀏覽器限制：必須要有使用者互動(點擊/按鍵)才能觸發音訊播放
        window.addEventListener('click', tryStartBGM);

        function tryStartBGM() {
            if(!bgmStarted) {
                const audio = document.getElementById('bgm');
                audio.volume = 0.5; // 背景音量適中
                audio.play().then(() => {
                    bgmStarted = true;
                    document.getElementById('bgm-btn').style.opacity = '1';
                }).catch(err => console.log('等待互動以播放音樂...'));
            }
        }

        function toggleBGM() {
            const audio = document.getElementById('bgm');
            const btn = document.getElementById('bgm-btn');
            if (audio.paused) {
                audio.play();
                btn.style.opacity = '1';
                bgmStarted = true;
            } else {
                audio.pause();
                btn.style.opacity = '0.5';
            }
        }

        // --- 遊戲迴圈 ---
        function logicUpdate() {
            const confirmBox = document.getElementById('transition-confirm');
            // 對話打開或是過場提示打開時鎖定移動
            if(bubble.style.display === 'block' || document.getElementById('inventory-panel').style.display === 'flex' || confirmBox.style.display === 'flex') return;

            let moveX = 0;
            const SPEED = isDevMode ? 15 : 8; // 開發者模式加速至 15，原生移速 8
            if (keys['a']) moveX = -SPEED;
            if (keys['d']) moveX = SPEED;

            if (moveX !== 0) {
                camX += moveX;

                // 邊界自動過場 (Edge Auto-Transition)
                if (camX >= WORLD_W - VIEW_W) {
                    if (currentScene === 'DINING_CAR') {
                        promptTransition('CORRIDOR', 50); // 傳送往走廊的超左側
                        return;
                    } else if (currentScene === 'CORRIDOR') {
                        promptTransition('KITCHEN', 50); // 傳送往廚房的超左側
                        return;
                    }
                } else if (camX <= 0) {
                    if (currentScene === 'CORRIDOR') {
                        promptTransition('DINING_CAR', Math.max(0, VIEW_H * SCENES.DINING_CAR.widthRatio - VIEW_W - 50));
                        return;
                    } else if (currentScene === 'KITCHEN') {
                        promptTransition('CORRIDOR', Math.max(0, VIEW_H * SCENES.CORRIDOR.widthRatio - VIEW_W - 50));
                        return;
                    } else if (currentScene === 'CABIN') {
                        // 離開包廂返回走廊 (退回到 303 門口附近)
                        promptTransition('CORRIDOR', 1800); 
                        return;
                    }
                }

                camX = Math.max(0, Math.min(WORLD_W - VIEW_W, camX));
            }
        }

        function renderUpdate() {
            // 直接平移視界
            world.style.transform = `translate(${-Math.floor(camX)}px, 0px)`;
        }

        function gameLoop() {
            logicUpdate();
            renderUpdate();
            requestAnimationFrame(gameLoop);
        }

        // --- 對話樹系統 ---
        let currentNPCId = null;

        function startDialogue(event, npcId) {
            event.stopPropagation();
            
            gameState.npcs[npcId].met = true;
            currentNPCId = npcId;
            let node = gameState.npcs[npcId].dialogueNode;
            
            renderDialogueNode(npcId, node);
        }

        function renderDialogueNode(npcId, nodeId) {
            let nodeData = dialogueTree[npcId][nodeId];
            if(!nodeData) return;
            
            // --- 線索條件過濾 ---
            if (nodeData.choices) {
                nodeData.choices = nodeData.choices.filter(c => {
                    if (c.condition && !gameState.clues.collected.includes(c.condition)) return false;
                    return true;
                });
            }

            // 特殊強制轉向
            if (nodeId === 'ZHAO_2' && !gameState.clues.collected.includes('CLUE_FILM_CASE')) nodeData = dialogueTree[npcId]['END'];
            if (nodeId === 'BARONESS_3' && !gameState.clues.collected.includes('CLUE_COFFEE_CUP')) nodeData = dialogueTree[npcId]['END'];
            if (nodeId === 'FANG_2' && !gameState.clues.collected.includes('CLUE_STETHOSCOPE')) nodeData = dialogueTree[npcId]['END'];

            document.getElementById('bubble-name').innerText = gameState.npcs[npcId].name;
            setDialogueText(nodeData.text);
            
            const optionsContainer = document.getElementById('bubble-options');
            const nextBtn = document.getElementById('bubble-next-btn');
            optionsContainer.innerHTML = '';

            if (nodeData.choices && nodeData.choices.length > 0) {
                optionsContainer.style.display = 'flex';
                nextBtn.style.display = 'none';
                
                nodeData.choices.forEach(choice => {
                    const btn = document.createElement('div');
                    btn.className = 'dialogue-btn';
                    btn.innerText = choice.text;
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        // 處理文法與線索發放
                        if(choice.grammarPoint) gameState.grammarProgress[choice.grammarPoint].isCorrect = choice.isCorrect;
                        
                        // 處理羈絆點數
                        if (choice.tone === "polite") gameState.rapport[npcId].polite++;
                        if (choice.tone === "aggressive") gameState.rapport[npcId].aggressive++;

                        if(choice.clueId && !gameState.clues.collected.includes(choice.clueId)) {
                            gameState.clues.collected.push(choice.clueId);
                            const isDistorted = choice.isCorrect === false;
                            const clueObj = {
                                id: choice.clueId,
                                isDistorted: isDistorted,
                                name: choice.clueId.replace('CLUE_', '').replace('_', ' '),
                                desc: choice.playerReceived,
                                truth: choice.truthVersion
                            };
                            gameState.clues.details[choice.clueId] = clueObj;
                            collectItem(clueObj, document.getElementById(npcId));
                        }

                        // 記憶 NPC 當前對話進度
                        let targetNode = choice.nextNode;

                        // 羈絆 Bonus 攔截邏輯
                        if (targetNode === "END" && !gameState.rapport[npcId].bonusUnlocked) {
                            const r = gameState.rapport[npcId];
                            if (r.polite >= 2) {
                                targetNode = `${npcId}_BONUS_POLITE`;
                                r.bonusUnlocked = "POLITE";
                            } else if (r.aggressive >= 1) {
                                targetNode = `${npcId}_BONUS_AGGRESSIVE`;
                                r.bonusUnlocked = "AGGRESSIVE";
                            }
                        }

                        if (targetNode) {
                            gameState.npcs[npcId].dialogueNode = targetNode;
                        }

                        // 自動進入其 response 節點
                        if (choice.response) {
                            dialogueTree[npcId]['_TEMP_RESP'] = {
                                text: choice.response,
                                choices: targetNode && targetNode !== 'END' ? [{ text: "繼續", nextNode: targetNode }] : []
                            };
                            renderDialogueNode(npcId, '_TEMP_RESP');
                        } else if (targetNode) {
                            renderDialogueNode(npcId, targetNode);
                        }
                    };
                    optionsContainer.appendChild(btn);
                });
            } else {
                // 無選項，顯示結束按鈕 
                optionsContainer.style.display = 'none';
                nextBtn.style.display = 'block';
            }

            // 恢復視覺小說面板，取消定位追蹤
            bubble.style.display = 'block';
        }

        function closeDialogue() {
            bubble.style.display = 'none';
            currentNPCId = null;
            checkAccuseButtonVisible();
        }

        function checkAccuseButtonVisible() {
            // 所有 NPC 是否都已對話過
            const allMet = Object.values(gameState.npcs).every(n => n.met === true);
            if(allMet) {
                document.getElementById('accuse-btn').style.display = 'flex';
            }
        }

        function resolveEnding() {
            const gp = gameState.grammarProgress;
            // 如果 isCorrect 仍為 null，代表該分支尚未走到結局點
            const allDone = ['GP1_HONORIFIC','GP2_TIME_ADVERB','GP3_LOCATION_WORD','GP4_WORD_ORDER']
                .every(k => gp[k].isCorrect !== null);
            
            if (!allDone) {
                // 提示尚未調查完畢
                document.getElementById('bubble-name').innerText = "系統提示";
                document.getElementById('bubble-text').innerText = "還有嫌疑人的細節尚未調查完畢，現階段無法指認真兇。";
                document.getElementById('bubble-options').style.display = 'none';
                document.getElementById('bubble-next-btn').style.display = 'block';
                document.getElementById('speech-bubble').style.display = 'block';
                return;
            }

            const allCorrect = Object.values(gp).every(g => g.isCorrect === true);
            const gp1Wrong = gp.GP1_HONORIFIC.isCorrect === false;
            const gp2Wrong = gp.GP2_TIME_ADVERB.isCorrect === false;
            const gp3Wrong = gp.GP3_LOCATION_WORD.isCorrect === false;
            const gp4Wrong = gp.GP4_WORD_ORDER.isCorrect === false;
            const multipleWrong = Object.values(gp).filter(g => g.isCorrect === false).length >= 2;

            if (multipleWrong) return triggerEnding('FALSE_END_TRUTH_HIDDEN');
            if (allCorrect) return triggerEnding('TRUE_END');
            if (gp1Wrong) return triggerEnding('FALSE_END_ACCUSE_BARONESS');
            if (gp2Wrong) return triggerEnding('FALSE_END_ACCUSE_WAITER');
            if (gp3Wrong) return triggerEnding('FALSE_END_ACCUSE_DOCTOR');
            if (gp4Wrong) return triggerEnding('FALSE_END_UNSOLVED');
        }

        function triggerEnding(type) {
            const screen = document.getElementById('ending-screen');
            const title = document.getElementById('ending-title');
            const desc = document.getElementById('ending-desc');
            screen.style.display = 'flex';

            if (type === 'TRUE_END') {
                const hasReinforcement = gameState.clues.collected.includes('CLUE_SCARF') && 
                                         gameState.clues.collected.includes('CLUE_ZHAO_LIE') && 
                                         gameState.clues.collected.includes('CLUE_FILM_CASE');

                screen.style.background = 'rgba(10, 50, 10, 0.95)';
                title.innerText = '真相大白';
                desc.innerText = '趙福生是兇手。他與江明合夥走私，為滅口而殺人。' + 
                                (hasReinforcement ? '\n\n（圍巾上的纖維與趙福生大衣吻合，證據確鑿。）' : '');
                title.style.color = '#4CAF50';
            } else {
                screen.style.background = type === 'FALSE_END_TRUTH_HIDDEN' ? 'rgba(0, 0, 0, 0.95)' : 'rgba(50, 10, 10, 0.95)';
                title.innerText = '解謎失敗';
                title.style.color = '#F44336';
                if (type === 'FALSE_END_ACCUSE_BARONESS') desc.innerText = '你指認了白男爵夫人。但真兇逍遙法外...';
                else if (type === 'FALSE_END_ACCUSE_WAITER') desc.innerText = '你指認了陳阿發。但真兇逍遙法外...';
                else if (type === 'FALSE_END_ACCUSE_DOCTOR') desc.innerText = '你指認了方小蘭。但真兇逍遙法外...';
                else if (type === 'FALSE_END_UNSOLVED') desc.innerText = '案件懸而未決。助手成了替罪羊...';
                else if (type === 'FALSE_END_TRUTH_HIDDEN') desc.innerText = '真相被層層掩蓋。兇手永遠不會被找到。';
            }

            // 確保重啟按鈕先隱藏
            document.getElementById('end-restart-btn').style.display = 'none';

            // 延遲 2 秒從右下角飛入評鑑書
            setTimeout(() => {
                showEvaluationReport(type);
            }, 2000);
        }

        const grammarCompare = {
            GP1_HONORIFIC: { name: "敬語 (白男爵夫人)", w: "「你認識江明嗎？」", r: "「不好意思打擾您，請問您認識江明先生嗎？」" },
            GP2_TIME_ADVERB: { name: "時間副詞 (陳阿發)", w: "「你昨天晚上在哪裡？」", r: "「你昨晚幾點還在餐車？」" },
            GP3_LOCATION_WORD: { name: "空間介詞 (方小蘭)", w: "「你的聽診器在餐車找到。」", r: "「在餐車桌子下面找到您的聽診器。」" },
            GP4_WORD_ORDER: { name: "語序 (趙福生)", w: "「你昨晚看見什麼了嗎？」", r: "「昨晚您在餐車看見什麼？」" }
        };

        function showEvaluationReport(endType) {
            const report = document.getElementById('eval-report');
            const gp = gameState.grammarProgress;
            
            // 系統分級
            let correctCount = Object.values(gp).filter(g => g.isCorrect).length;
            let rank = "C級";
            if (correctCount === 4) rank = "S級";
            else if (correctCount === 3) rank = "A級";
            else if (correctCount === 2) rank = "B級";
            
            document.getElementById('eval-rank').innerText = rank;

            // 組裝左側語法明細
            let grammarHtml = "";
            for (let k in grammarCompare) {
                let isRight = gp[k].isCorrect;
                let learnedPuzzle = gp[k].learnedThroughPuzzle;
                let data = grammarCompare[k];
                if (isRight || learnedPuzzle) {
                     let extra = learnedPuzzle ? `<br><small style="color:var(--ui-gold)">★ 您透過謎題掌握了時間狀語前置的規則</small>` : "";
                     grammarHtml += `<div class="eval-item right"><b>✔ ${data.name}</b><br><small style="color:#4CAF50">${data.r}</small>${extra}</div>`;
                } else {
                     grammarHtml += `<div class="eval-item wrong"><b>✘ ${data.name}</b><br>
                        <small><b>你的選擇:</b> ${data.w}<br>
                        <b>正確對比:</b> ${data.r}</small></div>`;
                }
            }
            document.getElementById('eval-grammar-list').innerHTML = grammarHtml;

            // 組裝右側收集線索歷史
            let clueHtml = "";
            gameState.clues.collected.forEach(id => {
                let clue = gameState.clues.details[id];
                let typeText = clue.isDistorted ? "<span style='color:#C62828'>[DISTORTED]</span>" : "<span style='color:#2E7D32'>[TRUE]</span>";
                let fullDesc = clue.desc + (clue.truth ? `<br><b style="color:var(--ui-gold)">真相解析：</b>${clue.truth}` : "");
                clueHtml += `<div style="margin-bottom:15px; border-bottom: 1px dotted #555; padding-bottom:10px;">${typeText} <b>${clue.id}</b><br><small style="color:#ccc;">${fullDesc}</small></div>`;
            });
            document.getElementById('eval-clue-list').innerHTML = clueHtml;

            // 組裝底部總結
            let footer = document.getElementById('eval-footer');
            if (endType === 'TRUE_END') footer.innerText = "「您的語法掌握讓真相浮現。」";
            else footer.innerText = "「語法的誤差，讓真相蒙上了陰影。」";

            // 新增羈絆回顧
            let rapportHtml = `<div style="margin-top:20px; border-top:2px solid var(--ui-gold); padding-top:10px;">
                                <h3 style="color:var(--ui-gold)">人際羈絆與心理博弈</h3>
                                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">`;
            for (let npc in gameState.rapport) {
                let r = gameState.rapport[npc];
                let name = gameState.npcs[npc].name;
                let status = r.bonusUnlocked ? `<span style='color:#4CAF50'>[解鎖線索: ${r.bonusUnlocked}]</span>` : "<span style='color:#777'>[未獲得額外情報]</span>";
                rapportHtml += `<div class="eval-item" style="background:rgba(255,255,255,0.05); padding:10px;">
                                    <b>${name}</b> ${status}<br>
                                    禮貌: ${r.polite} | 強硬: ${r.aggressive}
                                </div>`;
            }
            rapportHtml += `</div></div>`;
            document.getElementById('eval-body').innerHTML += rapportHtml;

            report.style.display = 'flex';
            // 強制瀏覽器重繪後套用動畫 class
            setTimeout(() => { report.classList.add('show'); }, 50);
        }

        function closeEval() {
            const report = document.getElementById('eval-report');
            report.classList.remove('show');
            setTimeout(() => {
                report.style.display = 'none';
                document.getElementById('end-restart-btn').style.display = 'block'; // 關閉後顯現重啟按鈕
            }, 800);
        }

        function collectItem(clueObj, sourceDom) {
            // 這個物件不需要消失，只是跳出動畫
            const rect = sourceDom.getBoundingClientRect();
            const screenX = rect.left + rect.width / 2;
            const screenY = rect.top + rect.height / 2;
            
            inventory.push(clueObj);
            unseenClues++;
            updateInventoryUI();

            const flyObj = document.createElement('div');
            flyObj.className = 'fly-item';
            flyObj.style.left = screenX + 'px';
            flyObj.style.top = screenY + 'px';
            flyObj.style.setProperty('--start-x', screenX + 'px');
            flyObj.style.setProperty('--start-y', screenY + 'px');
            
            gameContainer.appendChild(flyObj);
            
            setTimeout(() => {
                flyObj.remove();
            }, 800);
        }

        function updateInventoryUI() {
            const list = document.getElementById('inv-list');
            const badge = document.getElementById('inv-badge');
            
            // 更新角標
            if(unseenClues > 0) {
                badge.style.opacity = '1';
                badge.innerText = unseenClues;
            } else {
                badge.style.opacity = '0';
            }

            if (inventory.length === 0) {
                list.innerHTML = "<div style='color:#777; width:100%; text-align:center;'>尚未收集任何證據。</div>";
                return;
            }
            list.innerHTML = inventory.map(i => `
                <div class="inv-item" title="${i.desc}">
                    <div style="font-size:24px; margin-bottom:5px;">🔍</div>
                    <div style="font-size:12px; font-weight:bold;">${i.id.replace('CLUE_', '')}</div>
                </div>
            `).join('');
        }

        function toggleInventory() {
            const panel = document.getElementById('inventory-panel');
            if (panel.style.display === 'flex') {
                panel.style.display = 'none';
            } else {
                // 打開背包時清空未讀數
                unseenClues = 0;
                updateInventoryUI();
                panel.style.display = 'flex';
            }
        }

        // 啟動迴圈與多場景掛載
        // initScene('DINING_CAR', 500); 
        // requestAnimationFrame(gameLoop);

        // =====================================================
        // 文字物理謎題系統 (Text Physics Puzzle)
        // =====================================================
        const PUZZLE_CONFIG = {
            chars: ['昨晚', '他', '帶走', '底片', '的人'],
            answer: ['昨晚', '他', '帶走', '底片'],
            repelRadius: 100,
            repelForce: 0.3,
            tileRepelRadius: 85, // 方塊間開始排斥的距離
            tileRepelForce: 0.15, // 方塊排斥力度
            friction: 0.85,
            snapDist: 45,  // 放大吸附半徑
            snapSpeed: 5.0, // 放大容許速度
        };

        let puzzleState = {
            chars: [], mouseX: 0, mouseY: 0,
            rafId: null, errorCount: 0,
            paperRect: null, slotRects: [],
        };

        function openTextPuzzle() {
            const overlay = document.getElementById('text-puzzle-overlay');
            overlay.classList.add('active');
            if (puzzleState.chars.length === 0) _initPuzzleChars();
            const paper = document.getElementById('puzzle-paper');
            puzzleState.paperRect = paper.getBoundingClientRect();
            _updateSlotRects();
            if (!puzzleState.rafId) {
                puzzleState.rafId = requestAnimationFrame(_puzzleLoop);
            }
            overlay.onmousemove = (e) => {
                const pr = puzzleState.paperRect;
                puzzleState.mouseX = e.clientX - pr.left;
                puzzleState.mouseY = e.clientY - pr.top;
            };
        }

        function closePuzzle() {
            document.getElementById('text-puzzle-overlay').classList.remove('active');
            if (puzzleState.rafId) {
                cancelAnimationFrame(puzzleState.rafId);
                puzzleState.rafId = null;
            }
        }

        function _initPuzzleChars() {
            const area = document.getElementById('puzzle-char-area');
            area.innerHTML = '';
            puzzleState.chars = [];
            const paper = document.getElementById('puzzle-paper');
            const W = paper.offsetWidth;
            const H = paper.offsetHeight - 100;
            PUZZLE_CONFIG.chars.forEach((text) => {
                const el = document.createElement('div');
                el.className = 'puzzle-char';
                el.innerText = text;
                area.appendChild(el);
                const x = 80 + Math.random() * (W - 220);
                const y = 60 + Math.random() * (H - 120);
                puzzleState.chars.push({
                    text, x, y,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    locked: false, slotIndex: -1, el,
                });
                el.style.left = x + 'px';
                el.style.top = y + 'px';
            });
        }

        function _updateSlotRects() {
            const paper = document.getElementById('puzzle-paper');
            const pr = paper.getBoundingClientRect();
            puzzleState.slotRects = Array.from(document.querySelectorAll('.puzzle-slot')).map(s => {
                const r = s.getBoundingClientRect();
                return {
                    cx: r.left - pr.left + r.width / 2,
                    cy: r.top - pr.top + r.height / 2,
                    el: s, slotIdx: parseInt(s.dataset.slot),
                };
            });
        }

        function _puzzleLoop() {
            const paper = document.getElementById('puzzle-paper');
            const W = paper.offsetWidth;
            const H = paper.offsetHeight - 80;

            // --- 方塊間的碰撞與排斥 (Tile-to-Tile Collision) ---
            for (let i = 0; i < puzzleState.chars.length; i++) {
                for (let j = i + 1; j < puzzleState.chars.length; j++) {
                    const c1 = puzzleState.chars[i];
                    const c2 = puzzleState.chars[j];
                    if (c1.locked && c2.locked) continue; // 兩個都固定了就不處理

                    // 計算中心點距離
                    const dx = c1.x - c2.x; 
                    const dy = c1.y - c2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < PUZZLE_CONFIG.tileRepelRadius && dist > 1) {
                        const overlap = PUZZLE_CONFIG.tileRepelRadius - dist;
                        const force = overlap * PUZZLE_CONFIG.tileRepelForce;
                        const nx = dx / dist; // 法向量
                        const ny = dy / dist;

                        // 同時給予速度與微小的位移修正，防止黏在一起
                        if (!c1.locked) {
                            c1.vx += nx * force;
                            c1.vy += ny * force;
                            c1.x += nx * (overlap * 0.2);
                            c1.y += ny * (overlap * 0.2);
                        } else {
                            // c1 鎖定，被撞時觸發震動
                            _triggerPuzzleShake(c1);
                        }
                        if (!c2.locked) {
                            c2.vx -= nx * force;
                            c2.vy -= ny * force;
                            c2.x -= nx * (overlap * 0.2);
                            c2.y -= ny * (overlap * 0.2);
                        } else {
                            // c2 鎖定，被撞時觸發震動
                            _triggerPuzzleShake(c2);
                        }
                    }
                }
            }

            // --- 鼠標排斥與基本運動 ---
            puzzleState.chars.forEach(c => {
                if (c.locked) return;
                const dx = c.x - puzzleState.mouseX;
                const dy = c.y - puzzleState.mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < PUZZLE_CONFIG.repelRadius && dist > 1) {
                    const force = (PUZZLE_CONFIG.repelRadius - dist) * PUZZLE_CONFIG.repelForce;
                    c.vx += (dx / dist) * force;
                    c.vy += (dy / dist) * force;
                }
                c.vx *= PUZZLE_CONFIG.friction;
                c.vy *= PUZZLE_CONFIG.friction;
                c.x += c.vx;
                c.y += c.vy;
                const elW = c.el.offsetWidth || 80;
                const elH = c.el.offsetHeight || 42;
                if (c.x < 0) { c.x = 0; c.vx = Math.abs(c.vx) * 0.6; }
                if (c.y < 48) { c.y = 48; c.vy = Math.abs(c.vy) * 0.6; }
                if (c.x + elW > W) { c.x = W - elW; c.vx = -Math.abs(c.vx) * 0.6; }
                if (c.y + elH > H) { c.y = H - elH; c.vy = -Math.abs(c.vy) * 0.6; }

                // --- 磁力吸附輔助 (Magnetic Snapping Assist) ---
                let nearestSlot = null;
                let minDistToSlot = Infinity;
                for (const slot of puzzleState.slotRects) {
                    const occupied = puzzleState.chars.some(o => o !== c && o.locked && o.slotIndex === slot.slotIdx);
                    if (occupied) continue;
                    const sdx = c.x - slot.cx; // 已修正：中心點對中心點
                    const sdy = c.y - slot.cy;
                    const d = Math.sqrt(sdx * sdx + sdy * sdy);
                    if (d < minDistToSlot) {
                        minDistToSlot = d;
                        nearestSlot = slot;
                    }
                }

                if (nearestSlot && minDistToSlot < PUZZLE_CONFIG.snapDist * 1.5) {
                    // 靠近空格時施加阻尼與引力，輔助定位
                    c.vx *= 0.75; 
                    c.vy *= 0.75;
                    const sdx = nearestSlot.cx - c.x;
                    const sdy = nearestSlot.cy - c.y;
                    c.vx += sdx * 0.08;
                    c.vy += sdy * 0.08;
                }

                // --- 判定吸附 (Remove Speed Gate for Instant Catch) ---
                for (const slot of puzzleState.slotRects) {
                    const occupied = puzzleState.chars.some(o => o !== c && o.locked && o.slotIndex === slot.slotIdx);
                    if (occupied) continue;
                    const sdx = c.x - slot.cx;
                    const sdy = c.y - slot.cy;
                    if (Math.sqrt(sdx * sdx + sdy * sdy) < PUZZLE_CONFIG.snapDist) {
                        if (PUZZLE_CONFIG.answer[slot.slotIdx] === c.text) {
                            c.x = slot.cx;
                            c.y = slot.cy;
                            c.vx = 0; c.vy = 0;
                            c.locked = true; c.slotIndex = slot.slotIdx;
                            c.el.classList.add('locked');
                            slot.el.classList.add('filled');
                            slot.el.innerText = '';
                            _checkPuzzleSolved();
                        } else {
                            c.vx = (Math.random() - 0.5) * 6;
                            c.vy = -3 - Math.random() * 3;
                            slot.el.classList.add('error');
                            setTimeout(() => slot.el.classList.remove('error'), 500);
                            puzzleState.errorCount++;
                            if (puzzleState.errorCount >= 1) {
                                document.getElementById('puzzle-hint-msg').classList.add('visible');
                            }
                        }
                        break;
                    }
                }
                c.el.style.left = c.x + 'px';
                c.el.style.top = c.y + 'px';
            });
            puzzleState.rafId = requestAnimationFrame(_puzzleLoop);
        }

        function _checkPuzzleSolved() {
            const solved = PUZZLE_CONFIG.answer.every((ans, i) =>
                puzzleState.chars.some(c => c.locked && c.slotIndex === i && c.text === ans)
            );
            if (!solved) return;
            cancelAnimationFrame(puzzleState.rafId);
            puzzleState.rafId = null;
            document.getElementById('puzzle-success-flash').classList.add('show');
            setTimeout(() => document.getElementById('puzzle-solved-text').classList.add('show'), 600);
            setTimeout(() => {
                const clueObj = {
                    id: 'CLUE_JIANGMING_NOTE', isDistorted: false,
                    name: '江明的隱藏紙條',
                    desc: '江明的隱藏筆記顯示：昨晚有人帶走了底片。',
                    truth: '江明在被殺前記錄了底片被取走的時間，指向趙福生。',
                };
                gameState.clues.collected.push('CLUE_JIANGMING_NOTE');
                gameState.clues.details['CLUE_JIANGMING_NOTE'] = clueObj;
                if (gameState.grammarProgress['GP4_WORD_ORDER']) {
                    gameState.grammarProgress['GP4_WORD_ORDER'].learnedThroughPuzzle = true;
                }
                const paperEl = document.getElementById('puzzle-paper');
                collectItem(clueObj, paperEl);
                updateInventoryUI();
                checkAccuseButtonVisible();
                setTimeout(() => {
                    closePuzzle();
                    const area = document.getElementById('puzzle-char-area');
                    area.innerHTML = '';
                    puzzleState.chars = [];
                    document.getElementById('puzzle-success-flash').classList.remove('show');
                    document.getElementById('puzzle-solved-text').classList.remove('show');
                    document.querySelectorAll('.puzzle-slot').forEach(s => {
                        s.classList.remove('filled');
                        const labels = ['一','二','三','四'];
                        s.innerText = `第${labels[parseInt(s.dataset.slot)]}位`;
                    });
                    document.getElementById('puzzle-hint-msg').classList.remove('visible');
                    puzzleState.errorCount = 0;
                    if (currentScene === 'KITCHEN') initScene('KITCHEN', camX);
                }, 2000);
            }, 1500);
        }

        function _triggerPuzzleShake(charObj) {
            if (charObj.isShaking) return;
            charObj.isShaking = true;
            charObj.el.classList.add('shake');
            setTimeout(() => {
                charObj.el.classList.remove('shake');
                charObj.isShaking = false;
            }, 300);
        }

    </script>
</body>
